# Provisions infra and deploys application code via azd. Triggered automatically
# after a successful CI run on main, or manually via workflow_dispatch. Uses
# OIDC federated credentials (no secrets) and gates on the workshop-dev
# GitHub Environment for branch protection and reviewer approval.
name: deploy

on:
  workflow_dispatch:
    inputs:
      azureEnvName:
        description: "azd env name (defaults to dev-001)"
        required: false
        type: string
        default: dev-001
  workflow_run:
    workflows: [ci]
    types: [completed]
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: azd up
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: workshop-dev
      url: ${{ steps.azd.outputs.endpoint }}
    env:
      AZURE_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_LOCATION:        ${{ vars.AZURE_LOCATION || 'canadaeast' }}
      AZURE_ENV_NAME:        ${{ inputs.azureEnvName || vars.AZURE_ENV_NAME || 'dev-001' }}
      SQL_ADMIN_LOGIN:       ${{ vars.SQL_ADMIN_LOGIN }}
      SQL_ADMIN_OBJECT_ID:   ${{ vars.SQL_ADMIN_OBJECT_ID }}
      SQL_ADMIN_GROUP_ID:    ${{ vars.SQL_ADMIN_GROUP_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install azd
        uses: Azure/setup-azd@v2

      - name: azd auth login (OIDC)
        run: |
          azd auth login \
            --client-id "$AZURE_CLIENT_ID" \
            --tenant-id "$AZURE_TENANT_ID" \
            --federated-credential-provider github

      - name: Log in to Azure CLI (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: azd provision + deploy
        id: azd
        run: |
          chmod +x infra/scripts/*.sh
          azd env new "$AZURE_ENV_NAME" \
            --no-prompt \
            --location "$AZURE_LOCATION" \
            --subscription "$AZURE_SUBSCRIPTION_ID" || true
          azd env select "$AZURE_ENV_NAME"
          azd env set SQL_ADMIN_LOGIN "$SQL_ADMIN_LOGIN"
          azd env set SQL_ADMIN_OBJECT_ID "$SQL_ADMIN_OBJECT_ID"
          azd up --no-prompt

          endpoint=$(azd env get-values | grep -E '^WEB_URI=' | cut -d= -f2- | tr -d '"' || true)
          echo "endpoint=$endpoint" >> "$GITHUB_OUTPUT"

      - name: Grant UAMI SQL access via Entra group
        run: |
          # Retrieve the UAMI principal ID from azd env outputs
          uami_principal_id=$(azd env get-value UAMI_PRINCIPAL_ID 2>/dev/null || \
            az identity show \
              --name "$(azd env get-value UAMI_NAME)" \
              --resource-group "$(azd env get-value AZURE_RESOURCE_GROUP)" \
              --query principalId -o tsv)

          # Add UAMI to the SQL admin Entra group (idempotent — ignores if already member)
          az ad group member add \
            --group "$SQL_ADMIN_GROUP_ID" \
            --member-id "$uami_principal_id" 2>/dev/null \
            || echo "UAMI already a member of SQL admin group (or insufficient permissions — verify manually)"
