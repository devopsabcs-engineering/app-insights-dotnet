# Validates external links across all markdown and rendered HTML decks. Runs
# weekly (Mon 06:00 UTC) and on every PR. Fails the job on broken links so PRs
# cannot regress link health.
name: link-check

on:
  schedule:
    - cron: "0 6 * * 1"   # Monday 06:00 UTC
  pull_request:
    paths:
      - "**/*.md"
      - "docs/*.html"
  workflow_dispatch:

permissions:
  contents: read
  issues: write           # used to file an issue on weekly cron failure

jobs:
  lychee:
    name: lychee link check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      - name: Run lychee
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          fail: true
          args: >-
            --no-progress
            --max-concurrency 4
            './**/*.md'
            './docs/*.html'

      - name: Open issue on weekly failure
        if: github.event_name == 'schedule' && steps.lychee.outputs.exit_code != 0
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Link Checker Report (weekly)"
          content-filepath: ./lychee/out.md
          labels: report, automated, link-check
