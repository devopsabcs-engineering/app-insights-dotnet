# Lints all Markdown content with markdownlint-cli2 against
# .markdownlint-cli2.jsonc (created in Phase 4). Runs on every PR and push to
# main. Keeps EN/FR markdown style in lockstep.
name: markdown-lint

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "**/*.md"
      - "fr/**/*.md"
      - ".markdownlint-cli2.jsonc"
      - ".github/workflows/markdown-lint.yml"
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - "fr/**/*.md"
      - ".markdownlint-cli2.jsonc"
      - ".github/workflows/markdown-lint.yml"

permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    name: markdownlint-cli2
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run markdownlint-cli2
        uses: davidanson/markdownlint-cli2-action@v18
        with:
          globs: "**/*.md"
