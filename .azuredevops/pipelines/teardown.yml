# azure-pipelines/teardown.yml
# Manual-only teardown pipeline for the MAPAQ App Insights .NET 10 bilingual workshop.
# Authenticates via Workload Identity Federation (WIF) using the dedicated
# `sc-workshop-teardown` service connection (separate from deploy for blast-radius isolation).
# Runs `azd env select` then `azd down --purge --force` against the named environment.

trigger: none
pr: none

pool:
  vmImage: ubuntu-latest

parameters:
  - name: azureEnvName
    displayName: Azure Developer CLI environment name to tear down (required)
    type: string

stages:
  - stage: Teardown
    displayName: Teardown azd environment
    jobs:
      - deployment: teardown_workshop
        displayName: azd down --purge --force
        environment: workshop-teardown
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: AzureCLI@2
                  displayName: azd env select + azd down --purge --force (WIF)
                  inputs:
                    connectedServiceNameARM: 'sc-workshop-teardown'
                    azureSubscription: 'sc-workshop-teardown'
                    scriptType: bash
                    scriptLocation: inlineScript
                    addSpnToEnvironment: true
                    inlineScript: |
                      set -euo pipefail

                      # Install Azure Developer CLI (azd) on the agent.
                      curl -fsSL https://aka.ms/install-azd.sh | bash
                      azd version

                      # WIF identity exposed by addSpnToEnvironment: true
                      export AZURE_CLIENT_ID="$servicePrincipalId"
                      export AZURE_TENANT_ID="$tenantId"
                      export AZURE_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"

                      azd auth login \
                        --client-id "$AZURE_CLIENT_ID" \
                        --tenant-id "$AZURE_TENANT_ID" \
                        --federated-credential-provider azure-pipelines

                      azd env select "${{ parameters.azureEnvName }}"
                      azd down --purge --force --no-prompt
