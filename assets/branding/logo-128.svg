<?xml version="1.0" encoding="UTF-8"?>
<!--
  MAPAQ App Insights .NET 10 Workshop — site header logo (128x128)
  Geometric mark: crossed wheat-stalk + chart-line motif.
  Palette tokens: graphite #1F2A37, leaf #16A34A, sky #3B82F6, orange #F97316.
  No Quebec emblem, no MAPAQ trademark, no fleur-de-lys.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 128 128"
     role="img"
     aria-label="Workshop logo">
  <title>App Insights .NET 10 Workshop logo</title>
  <!-- Rounded background tile (graphite) -->
  <rect x="0" y="0" width="128" height="128" rx="20" ry="20" fill="#1F2A37"/>

  <!-- Inner panel for slight depth -->
  <rect x="8" y="8" width="112" height="112" rx="14" ry="14"
        fill="none" stroke="#3B82F6" stroke-opacity="0.15" stroke-width="1"/>

  <!-- Wheat stalk (leaf green) -->
  <g stroke="#16A34A" stroke-width="3.5" stroke-linecap="round" fill="none">
    <line x1="64" y1="22" x2="64" y2="106"/>
    <line x1="64" y1="38" x2="50" y2="32"/>
    <line x1="64" y1="38" x2="78" y2="32"/>
    <line x1="64" y1="52" x2="46" y2="46"/>
    <line x1="64" y1="52" x2="82" y2="46"/>
    <line x1="64" y1="66" x2="46" y2="60"/>
    <line x1="64" y1="66" x2="82" y2="60"/>
    <line x1="64" y1="80" x2="50" y2="74"/>
    <line x1="64" y1="80" x2="78" y2="74"/>
  </g>

  <!-- Chart line (sky blue) crossing the wheat stalk -->
  <polyline points="16,98 36,82 56,90 76,62 96,70 112,46"
            fill="none"
            stroke="#3B82F6"
            stroke-width="4"
            stroke-linecap="round"
            stroke-linejoin="round"/>

  <!-- Data point accents (orange) -->
  <circle cx="56" cy="90" r="3.5" fill="#F97316"/>
  <circle cx="76" cy="62" r="3.5" fill="#F97316"/>
  <circle cx="96" cy="70" r="3.5" fill="#F97316"/>
</svg>
